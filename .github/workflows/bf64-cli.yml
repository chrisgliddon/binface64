name: BF64 CLI

on:
  push:
    branches: [ main ]
    paths:
      - 'tools/bf64.py'
      - 'tests/**'
      - 'docs/docs/n64/limits.json'
      - '.github/workflows/bf64-cli.yml'
  pull_request:
    paths:
      - 'tools/bf64.py'
      - 'tests/**'
      - 'docs/docs/n64/limits.json'
      - '.github/workflows/bf64-cli.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check machine-readable limits
        run: python3 -m json.tool docs/docs/n64/limits.json >/tmp/bf64-limits.json

      - name: Compile CLI
        run: python3 -m py_compile tools/bf64.py

      - name: Run CLI tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
